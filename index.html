<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryEngine Pro</title>
    <link rel="stylesheet" href="style.css">

<script src="script.js"></script>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="screen active">
    <div class="card auth-card" style="max-width: 400px; margin: 100px auto; text-align: center;">
        <h1>StoryEngine Pro</h1>
        <div id="auth-mode-label" style="margin-bottom: 10px; font-size: 0.9rem; color:#6b7280;">Sign In</div>

        <div id="standard-auth-fields">
            <input type="text" id="auth-user" placeholder="Username">
            <input type="password" id="auth-password" placeholder="Password">
            
            <div id="signup-fields" style="display:none; margin-top: 10px;">
                <input type="text" id="auth-sq" placeholder="Security Question (e.g. First pet?)">
                <input type="password" id="auth-sa" placeholder="Security Answer">
            </div>

            <button class="btn-p" style="width: 100%; margin-top: 15px;" onclick="handleAuthSubmit()">Continue</button>

            <div style="margin-top: 12px; font-size:0.85rem; color:#6b7280;">
                <span id="auth-toggle-text">Need an account?</span>
                <button id="auth-toggle-btn" class="btn-s" style="margin-top:8px; width:100%; font-size:0.85rem;" onclick="toggleAuthMode()">Switch to Sign Up</button>
                <button id="forgot-pw-btn" class="btn-s" style="margin-top:8px; width:100%; font-size:0.85rem; background:transparent; color:var(--p); border:1px solid var(--p);" onclick="startPasswordRecovery()">Forgot Password?</button>
            </div>
        </div>

        <div id="recovery-fields" style="display:none;">
            <p id="recovery-instructions" style="font-size: 0.85rem; color: #4b5563; margin-bottom: 15px;">Enter your username to fetch your security question.</p>
            <input type="text" id="recovery-user" placeholder="Username">
            <button id="fetch-sq-btn" class="btn-p" style="width: 100%; margin-top: 10px;" onclick="fetchSecurityQuestion()">Find Account</button>

            <div id="sq-container" style="display:none; margin-top: 15px;">
                <p id="display-sq" style="font-weight:bold; font-size:0.9rem; color:#1f2937; margin-bottom:5px;"></p>
                <input type="password" id="recovery-sa" placeholder="Your Answer">
                <input type="password" id="new-password" placeholder="Enter New Password" style="margin-top: 10px;">
                <button class="btn-p" style="width: 100%; margin-top: 15px; background:#10b981;" onclick="resetPassword()">Reset Password</button>
            </div>

            <button class="btn-s" style="width: 100%; margin-top: 15px;" onclick="cancelRecovery()">← Back to Sign In</button>
        </div>

        <div id="auth-error" style="margin-top:10px; font-size:0.85rem; font-weight:bold; color:#b91c1c; display:none;"></div>
        <div id="auth-success" style="margin-top:10px; font-size:0.85rem; font-weight:bold; color:#10b981; display:none;"></div>
    </div>
</div>

<!-- DASHBOARD SCREEN -->
<div id="dash-screen" class="screen">
    <div class="header-row">
        <h1>My Library</h1>
        <div>
            <span id="dash-username" style="margin-right: 15px; font-weight: bold; color: var(--p);"></span>
            <button class="btn-s" onclick="handleLogout()">Logout</button>
        </div>
    </div>
    <div id="story-list"></div>
    <div class="card action-bar" style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="btn-p" onclick="openEditor()">+ Create New Story</button>
        <button class="btn-s" onclick="triggerImport()">📥 Import JSON</button>
        <input type="file" id="file-in" style="display:none" accept=".json">
    </div>
</div>

<!-- EDITOR SCREEN -->
<div id="edit-screen" class="screen">
    <div class="editor-header-bar">
        <button class="btn-s" onclick="showScreen('dash-screen')">← Dashboard</button>
        <input type="text" id="ed-title" class="story-title-input" placeholder="Story Title">
        <div style="display: flex; gap: 10px;">
            <button class="btn-s" onclick="exportStory()">Export</button>
            <button class="btn-p" onclick="saveStory()">Save to Library</button>
        </div>
    </div>

    <div class="editor-container">
        <div class="sidebar">
            <div class="sidebar-box">
                 <h3 style="color: white; margin-top: 0;">Variable Table</h3>
                 <div id="ed-var-table"></div>
            </div>
            <div class="sidebar-box" style="margin-top:20px;">
                 <h3 style="color: white; margin-top: 0;">Blocks</h3>
                 <div id="ed-blocks-menu" style="margin-bottom: 15px;"></div>
                 <button class="btn-p" style="width: 100%;" onclick="addBlock()">+ Add Block</button>
            </div>
        </div>

        <div class="main-content">
            <div class="card block-id-container">
                <span class="block-id-label">Current Block Name (ID)</span>
                <input type="text" id="ed-blk-id" placeholder="e.g. entry_hall">
            </div>

            <div class="card">
                <h3>Narrative Text</h3>
                <textarea id="ed-blk-text" rows="8" placeholder="Primary story text..."></textarea>
                <div id="var-helper-container"></div>
                
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">
                <div id="extra-text-container"></div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                    <h3 style="margin: 0;">Choices</h3>
                    <button class="btn-p" onclick="addChoice()">+ Add Choice</button>
                </div>
                <div id="ed-choices"></div>
            </div>
        </div>
    </div>
</div>

<!-- PLAY SCREEN -->
<div id="play-screen" class="screen">
    <div class="header-row">
        <button class="btn-s" onclick="showScreen('dash-screen')">← Exit</button>
        <h2 id="p-title"></h2>
    </div>
    <div id="game-msg"></div>
    <div class="play-grid">
        <div class="card game-area" id="story-card-area" style="position:relative;">
            <p id="p-text" style="font-size: 1.2rem; min-height: 100px; white-space: pre-wrap;"></p>
            <div id="p-choices"></div>
        </div>
        <div class="sidebar-box">
            <h3 style="color: white; margin-top: 0;">🎒 Backpack</h3>
            <div id="p-inventory"></div>
            <button class="btn-p" style="width:100%; margin-top: 15px;" onclick="saveGameState()">💾 Save Game</button>
            <div id="save-msg" style="color: #4ade80; font-size: 0.8rem; text-align:center; margin-top: 5px; display:none;">Progress Saved!</div>
        </div>
    </div>
</div>

<!-- PLAY MENU MODAL (Slots) -->
<div id="play-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="pm-title" style="margin-top:0; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">Play Story</h2>
        
        <!-- Main Choice View -->
        <div id="pm-main-view">
            <button class="btn-p" style="width:100%; margin-bottom:10px;" onclick="pmNewGame()">New Game</button>
            <button class="btn-p" style="width:100%; margin-bottom:15px; background:#10b981;" onclick="pmShowContinue()">Continue</button>
            <button class="btn-s" style="width:100%;" onclick="pmClose()">Cancel</button>
        </div>

        <!-- Save Slots View -->
        <div id="pm-slots-view" style="display:none;">
            <h3 style="margin-top:0; font-size:1rem; color:#475569;">Select Save Slot</h3>
            <div id="pm-slots-list"></div>
            <button class="btn-s" style="width:100%; margin-top:15px;" onclick="pmBackToMain()">← Back</button>
        </div>
    </div>
</div>

</body>
</html>
